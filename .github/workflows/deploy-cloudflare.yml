name: Deploy (Cloudflare Workers mirror)

# Secondary mirror deploy. Firebase Hosting is canonical (see deploy.yml and
# docs/RUNBOOK-deploy.md); this publishes the same dist/ to a Cloudflare Worker
# (static assets), which serves the SPA and runs worker/index.ts to proxy /api/*
# back to the Firebase-hosted gateway. The deploy step is gated on the Cloudflare
# secrets, so it no-ops cleanly until they are added in
# repo Settings → Secrets → Actions:
#   CLOUDFLARE_API_TOKEN  — token with "Workers Scripts: Edit" (+ account Workers access)
#   CLOUDFLARE_ACCOUNT_ID — the account that owns the "flygaca-app" Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: build · deploy Cloudflare Worker
    runs-on: ubuntu-latest
    # The secrets context is not available in if: expressions — referencing it
    # there is a parse error that voids the whole workflow (every push logged an
    # instant failure run). Mirror the secrets into env, and gate on env instead.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Real public web config for flygaca-app (mirrors .env.example / deploy.yml).
      - name: Provide build env
        run: cp .env.example .env.local

      - name: Build
        run: npm run build
        env:
          # Canonical URL stays flygaca.com on every host so SEO/sitemap agree.
          VITE_SITE_URL: https://flygaca.com
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reads name, main (worker/index.ts) and the dist/ assets from wrangler.toml.
          command: deploy

      - name: Note when skipped
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "::notice::Cloudflare secrets not set — built dist/ but skipped deploy. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to enable."
