name: Deploy (Cloudflare Pages mirror)

# Secondary mirror deploy. Firebase Hosting is canonical (see deploy.yml and
# docs/RUNBOOK-deploy.md); this publishes the same dist/ to Cloudflare Pages,
# which serves the SPA and runs functions/api/[[path]].ts to proxy /api/* back
# to the Firebase-hosted gateway. The deploy step is gated on the Cloudflare
# secrets, so it no-ops cleanly until they are added in
# repo Settings → Secrets → Actions:
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID — the account that owns the "flygaca-app" Pages project

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: build · deploy Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Real public web config for flygaca-app (mirrors .env.example / deploy.yml).
      - name: Provide build env
        run: cp .env.example .env.local

      - name: Build
        run: npm run build
        env:
          # Canonical URL stays flygaca.com on every host so SEO/sitemap agree.
          VITE_SITE_URL: https://flygaca.com
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=flygaca-app --branch=main

      - name: Note when skipped
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "::notice::Cloudflare secrets not set — built dist/ but skipped deploy. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to enable."
