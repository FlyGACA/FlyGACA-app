name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Real public web config for flygaca-app (Auth/Firestore) — mirrors deploy.yml
      # so previews exercise real Firebase sign-in, not the local-first fallback.
      - name: Provide build env
        run: cp .env.example .env.local
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLYGACA_APP }}
          projectId: flygaca-app
