name: Deploy (Firebase Hosting + rules)

# Canonical production deploy (see docs/RUNBOOK-deploy.md). Runs after CI-style
# build on push to main, or on demand via "Run workflow". Authenticates with a
# Google service account — add the JSON as the FIREBASE_SERVICE_ACCOUNT secret
# (Project Settings → Service accounts → Generate new private key). The VITE_*
# web config is public (mirrors .env.example); only the service account is secret.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_rules:
        description: 'Also deploy firestore.rules'
        type: boolean
        default: true

concurrency:
  group: deploy-firebase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: build · deploy hosting${{ github.event_name != 'workflow_dispatch' && ' + rules' || '' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Real public web config for flygaca-app (Auth/Firestore/Analytics/App Check).
      - name: Provide build env
        run: cp .env.example .env.local

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: https://flygaca.com
          # Optional: set to enable App Check (see docs/APP-CHECK-BACKEND.md).
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          # Optional: serve the ~130 MB /data corpus off a bucket to keep each
          # Hosting release small (see the "Offload data corpus" step + docs/
          # DATA-HOSTING.md). Empty → the app fetches /data same-origin as before.
          VITE_DATA_BASE_URL: ${{ vars.DATA_BASE_URL }}

      - name: Bundle budget
        run: npm run check:bundle

      # Snapshot the high-value routes into dist/<route>/index.html so production
      # (Firebase, the canonical host) serves prerendered HTML, not just the SPA
      # shell. Non-fatal by design — a prerender failure never blocks the deploy —
      # but any coverage gap (PRERENDER_MAX trim, failed route, whole-run skip)
      # surfaces as a ::warning:: annotation on this run; treat one as a signal
      # to raise PRERENDER_MAX in scripts/prerender.mjs.
      # shell. The prerender itself stays non-fatal (a Chromium hiccup shouldn't
      # crash the job mid-flight) — the coverage gate below is the fatal part.
      - name: Prerender static routes
        run: |
          npx playwright install --with-deps chromium
          npm run prerender

      # When a data bucket is configured, mirror the heavy /data corpus to it and
      # drop it from the Hosting release — keeps each release ~12 MB instead of
      # ~141 MB so it can't exhaust the Firebase Hosting storage quota. Runs
      # before the Firebase auth/deploy steps use those same credentials. No-op
      # until DATA_BUCKET (a gs:// target) is set; until then the corpus ships
      # from Hosting as before. Pair with DATA_BASE_URL in the Build step.
      - name: Offload data corpus to bucket
        if: ${{ vars.DATA_BUCKET != '' }}
        run: |
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT}" > "${RUNNER_TEMP}/data-sa.json"
          gcloud auth activate-service-account --key-file "${RUNNER_TEMP}/data-sa.json"
          echo "Mirroring public/data → ${{ vars.DATA_BUCKET }}/data"
          gsutil -m rsync -r -d public/data "${{ vars.DATA_BUCKET }}/data"
          rm -f "${RUNNER_TEMP}/data-sa.json"
          rm -rf dist/data
          echo "Stripped dist/data from the Hosting release."
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Fatal gate (SEO-PLAN 0.2): every sitemap URL must ship with real body
      # content — head-only or missing snapshots are invisible to the non-JS AI
      # crawlers that decide citations, so a coverage gap must fail the deploy
      # loudly instead of shipping silently.
      - name: Verify prerender coverage
        run: npm run check:prerender

      - name: Authenticate to Firebase
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT}" > "${RUNNER_TEMP}/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "${GITHUB_ENV}"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy
        run: |
          # On push to main: hosting + rules + indexes. On manual run: honor the input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_rules }}" != "true" ]; then
            TARGETS="hosting"
          else
            TARGETS="hosting,firestore:rules,firestore:indexes"
          fi
          echo "Deploying: ${TARGETS}"
          npx --yes firebase-tools@13 deploy --only "${TARGETS}" --project flygaca-app --non-interactive

      - name: Clean up credentials
        if: always()
        run: rm -f "${RUNNER_TEMP}/firebase-sa.json"
