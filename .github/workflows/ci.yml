name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests (calc + i18n parity + registry)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run check:bundle

  functions:
    name: functions · lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # Matches functions/package.json engines (root jobs stay on 20).
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  rules:
    name: firestore rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      # The Firestore emulator is a Java process (firebase emulators:exec).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      - name: Firestore security-rules tests
        run: npm run test:rules

  e2e:
    name: e2e · a11y (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E + a11y (builds + previews dist)
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
