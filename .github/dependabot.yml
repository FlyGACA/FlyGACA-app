# Dependency update cadence. Grouped + weekly to keep PR noise low on an active
# repo; security updates still open individually as Dependabot sees fit.
version: 2
updates:
  # Frontend app (root package.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Backend Cloud Functions (its own npm package)
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions pinned versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
