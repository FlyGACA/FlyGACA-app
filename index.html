<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
    <meta name="theme-color" content="#0A0E12" />
    <meta
      name="description"
      content="Fly GACA — an independent educational reference library of Saudi civil-aviation regulations (GACAR), charts and study tools. Not affiliated with GACA."
    />
    <!-- Baseline social tags (usePageMeta refines per route + language at runtime). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fly GACA — Saudi Aviation Library" />
    <meta
      property="og:description"
      content="An independent educational reference library of Saudi civil-aviation regulations (GACAR), charts and study tools. Not affiliated with GACA."
    />
    <meta property="og:image" content="/img/og-card.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Fly GACA — Saudi Aviation Library</title>
    <!-- Site-wide structured data (constant; per-route schema is injected by usePageMeta). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://flygaca.com/#organization",
            "name": "Fly GACA",
            "url": "https://flygaca.com",
            "logo": "https://flygaca.com/img/icon-512.png",
            "description": "Fly GACA — an independent educational reference library of Saudi civil-aviation regulations (GACAR). Not affiliated with GACA."
          },
          {
            "@type": "WebSite",
            "@id": "https://flygaca.com/#website",
            "name": "Fly GACA",
            "url": "https://flygaca.com",
            "inLanguage": ["en", "ar"],
            "publisher": { "@id": "https://flygaca.com/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://flygaca.com/library?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
    <!-- Fonts: preconnect, then load the stylesheet non-render-blocking (media=print
         flip) so first paint isn't gated on Google Fonts. display=swap already paints
         text in the fallback immediately, then swaps — no FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
